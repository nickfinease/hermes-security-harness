schemaVersion: web-target/v1
id: finese-local
name: FinEase Local (Hardship Case Management)
environment: local
baseUrl: http://localhost:3000
allowedHosts:
  - localhost
  - 127.0.0.1
scope:
  includePaths:
    - /
    - /login
    - /about
    - /api/health
    - /api/auth/session
    - /api/auth/csrf
    - /api/auth/signin
    - /api/auth/signout
    - /api/auth/callback/credentials
    - /dashboard
    - /api/intake
    - /api/settings
  maxRequests: 30
  maxRuntimeSeconds: 120
lifecycle:
  reset:
    command: cd /home/beans/FinEase && npx prisma db push --force-reset 2>/dev/null || true
    required: false
  seed:
    command: cd /home/beans/FinEase && npx tsx prisma/seed.ts 2>/dev/null
    required: false
detectors:
  enabled:
    - reachability-smoke
    - security-headers-smoke
    - injection
    - auth-flow
    - rate-limit
    - dependency-audit
    - static-scan
    - recon
    - chain-analysis
safety:
  requireLocalOrStaging: true
  requireAllowedHostMatch: true
  blockCloudMetadataIps: true
