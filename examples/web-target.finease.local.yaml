schemaVersion: web-target/v1
id: finease-local
name: FinEase Local Dev
environment: local
baseUrl: http://localhost:3000
allowedHosts:
  - localhost
  - 127.0.0.1
scope:
  includePaths:
    - /
    - /login
    - /api/health
  excludePaths:
    - /api/auth/*
    - /api/applications/*
    - /api/upload/*
    - /api/webhooks/*
    - /billing/*
  maxRequests: 8
  maxRuntimeSeconds: 60
detectors:
  enabled:
    - reachability-smoke
    - security-headers-smoke
safety:
  requireLocalOrStaging: true
  requireAllowedHostMatch: true
  blockCloudMetadataIps: true
