schemaVersion: web-target/v1
id: local-target
name: Local Web App
environment: local
baseUrl: http://localhost:3000
allowedHosts:
  - localhost
  - 127.0.0.1
sourceDir: /path/to/your/app  # Set this to your app's source root for filesystem route discovery + static scan
scope:
  includePaths:
    - /
    - /login
    - /api/health
    - /api/auth/session
    - /api/auth/csrf
    - /api/auth/signin
    - /api/auth/signout
    - /api/auth/callback/credentials
    - /dashboard
  maxRequests: 30
  maxRuntimeSeconds: 120
detectors:
  enabled:
    - reachability-smoke
    - security-headers-smoke
    - injection
    - auth-flow
    - rate-limit
    - dependency-audit
    - static-scan
    - recon
    - chain-analysis
safety:
  requireLocalOrStaging: true
  requireAllowedHostMatch: true
  blockCloudMetadataIps: true
